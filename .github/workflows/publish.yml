name: Publish

on:
  release:
    types:
      - created

permissions: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version-file: ".python-version"
      - name: Verify release tag matches pyproject version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          version="$(python -c "import tomllib, pathlib; print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])")"
          tag="${RELEASE_TAG#v}"
          echo "pyproject version: ${version}"
          echo "release tag:       ${RELEASE_TAG} (normalised: ${tag})"
          if [ "${version}" != "${tag}" ]; then
            echo "::error::Release tag '${RELEASE_TAG}' does not match pyproject version '${version}'. PyPI versions are immutable — aborting before publish."
            exit 1
          fi
      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          version: "0.11.4"
      - name: Build distribution
        run: uv build
      - name: Publish
        run: uv publish
