name: Publish

on:
  release:
    types:
      - created

permissions: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version-file: ".python-version"
      - name: Verify release tag matches pyproject version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          version="$(python -c "import tomllib, pathlib; print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])")"
          tag="${RELEASE_TAG#v}"
          echo "pyproject version: ${version}"
          echo "release tag:       ${RELEASE_TAG} (normalised: ${tag})"
          if [ "${version}" != "${tag}" ]; then
            echo "::error::Release tag '${RELEASE_TAG}' does not match pyproject version '${version}'. PyPI versions are immutable — aborting before publish."
            exit 1
          fi
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.4"
      - name: Build distribution
        run: uv build
      - name: Publish
        run: uv publish
