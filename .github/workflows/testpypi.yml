name: TestPyPI dry-run

# Manual smoke test of the build + publish pipeline against TestPyPI, so a
# real release to PyPI (publish.yml) is never the first time the flow runs.
#
# Prerequisites (one-time):
#   - Register the project on https://test.pypi.org and add a GitHub Actions
#     trusted publisher for this repo + this workflow (testpypi.yml).
#
# Notes:
#   - TestPyPI versions are immutable, like PyPI. If `version` in pyproject.toml
#     was already uploaded to TestPyPI, the publish step will fail — bump the
#     version (a local `.devN` suffix is fine for a dry-run) before re-running.

on:
  workflow_dispatch:

permissions: {}

jobs:
  testpypi:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # OIDC token for trusted publishing
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.4"
      - name: Build distribution
        run: uv build
      - name: Publish to TestPyPI
        run: uv publish --publish-url https://test.pypi.org/legacy/
